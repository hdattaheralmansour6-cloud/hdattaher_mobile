{% extends "public/base.html" %}
{% block title %}Créer un compte{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
{% endblock %}

{% block content %}
<div class="account-wrapper">
    <div class="account-card">
        <h1 data-i18n="register_title">Créer un compte</h1>
        <p class="account-subtitle" data-i18n="register_subtitle">Suivez vos commandes et gagnez du temps à chaque achat.</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="account-field">
                <label for="full_name" data-i18n="fullname_label">Nom complet *</label>
                <input type="text" id="full_name" name="full_name" required
                       value="{{ request.form.get('full_name', '') }}">
            </div>

            <div class="account-field">
                <label for="email" data-i18n="email_label">Email *</label>
                <input type="email" id="email" name="email" required
                       value="{{ request.form.get('email', '') }}">
            </div>

            <div class="account-field">
                <label for="phone" data-i18n="phone_label">Téléphone</label>
                <input type="tel" id="phone" name="phone"
                       value="{{ request.form.get('phone', '') }}">
            </div>

            <div class="account-field">
                <label for="password" data-i18n="password_label">Mot de passe *</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>

            <div class="account-field">
                <label for="confirm_password" data-i18n="confirm_password_label">Confirmer le mot de passe *</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-block" data-i18n="register_btn">Créer mon compte</button>
        </form>

        <div class="account-footer-link">
            <span data-i18n="already_account">Déjà un compte ?</span>
            <a href="{{ url_for('customer_login') }}" data-i18n="login_link">Se connecter</a>
        </div>
    </div>
</div>
{% endblock %}
