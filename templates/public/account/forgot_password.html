{% extends "public/base.html" %}
{% block title %}Mot de passe oublié{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
{% endblock %}

{% block content %}
<div class="account-wrapper">
    <div class="account-card">
        <h1 data-i18n="forgot_title">Mot de passe oublié</h1>
        <p class="account-subtitle" data-i18n="forgot_subtitle_code">Entrez votre email, nous générerons un code de réinitialisation à récupérer sur WhatsApp.</p>

        <form method="POST" id="forgotForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="account-field">
                <label for="email" data-i18n="email_label">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <button type="submit" class="btn btn-whatsapp btn-block">
                <i class="fab fa-whatsapp"></i> <span data-i18n="send_code_btn">Obtenir mon code</span>
            </button>
        </form>

        <div class="account-footer-link">
            <a href="{{ url_for('customer_login') }}" data-i18n="back_to_login">Retour à la connexion</a>
        </div>
    </div>
</div>

<script>
    // Au clic sur "Obtenir mon code" : on ouvre directement l'application WhatsApp
    // (lien natif whatsapp:// = pas de nouvel onglet), puis le formulaire est soumis
    // dans CE même onglet, qui affiche donc la page de saisie du code.
    // Quand le client revient de WhatsApp, il retrouve cette page telle quelle.
    document.getElementById('forgotForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var form = this;
        var email = document.getElementById('email').value.trim();
        var msg = encodeURIComponent('Bonjour, je veux mon code pour réinitialiser mon mot de passe. Email : ' + email);
        window.location.href = 'whatsapp://send?phone={{ settings.get("whatsapp", "22791720755") }}&text=' + msg;
        setTimeout(function () { form.submit(); }, 800);
    });
</script>
{% endblock %}
