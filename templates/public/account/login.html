{% extends "public/base.html" %}
{% block title %}Connexion{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
{% endblock %}

{% block content %}
<div class="account-wrapper">
    <div class="account-card">
        <h1>Connexion</h1>
        <p class="account-subtitle">Content de vous revoir !</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="account-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required
                       value="{{ request.form.get('email', '') }}">
            </div>

            <div class="account-field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
        </form>

        <div class="account-footer-link">
            <a href="{{ url_for('customer_forgot_password') }}">Mot de passe oublié ?</a>
        </div>
        <div class="account-footer-link">
            Pas encore de compte ? <a href="{{ url_for('customer_register') }}">S'inscrire</a>
        </div>
    </div>
</div>
{% endblock %}
