{% extends "public/base.html" %}
{% block title %}Créer un compte{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
{% endblock %}

{% block content %}
<div class="account-wrapper">
    <div class="account-card">
        <h1>Créer un compte</h1>
        <p class="account-subtitle">Suivez vos commandes et gagnez du temps à chaque achat.</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="account-field">
                <label for="full_name">Nom complet *</label>
                <input type="text" id="full_name" name="full_name" required
                       value="{{ request.form.get('full_name', '') }}">
            </div>

            <div class="account-field">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required
                       value="{{ request.form.get('email', '') }}">
            </div>

            <div class="account-field">
                <label for="phone">Téléphone</label>
                <input type="tel" id="phone" name="phone"
                       value="{{ request.form.get('phone', '') }}">
            </div>

            <div class="account-field">
                <label for="password">Mot de passe *</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>

            <div class="account-field">
                <label for="confirm_password">Confirmer le mot de passe *</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
        </form>

        <div class="account-footer-link">
            Déjà un compte ? <a href="{{ url_for('customer_login') }}">Se connecter</a>
        </div>
    </div>
</div>
{% endblock %}
