{% extends "public/base.html" %}
{% block title %}Réinitialiser le mot de passe{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
{% endblock %}

{% block content %}
<div class="account-wrapper">
    <div class="account-card">
        <h1>Nouveau mot de passe</h1>
        <p class="account-subtitle">Choisissez un nouveau mot de passe pour votre compte.</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="account-field">
                <label for="new_password">Nouveau mot de passe *</label>
                <input type="password" id="new_password" name="new_password" required minlength="6">
            </div>

            <div class="account-field">
                <label for="confirm_password">Confirmer le mot de passe *</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Réinitialiser</button>
        </form>
    </div>
</div>
{% endblock %}
