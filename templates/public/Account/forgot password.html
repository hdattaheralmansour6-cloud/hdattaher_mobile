{% extends "public/base.html" %}
{% block title %}Mot de passe oublié{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
{% endblock %}

{% block content %}
<div class="account-wrapper">
    <div class="account-card">
        <h1>Mot de passe oublié</h1>
        <p class="account-subtitle">Entrez votre email, nous générerons un lien de réinitialisation.</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="account-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Envoyer le lien</button>
        </form>

        <div class="account-footer-link">
            <a href="{{ url_for('customer_login') }}">Retour à la connexion</a>
        </div>
    </div>
</div>
{% endblock %}
